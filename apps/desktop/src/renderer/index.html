<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Graph Desktop</title>
    <link href="./index.css" rel="stylesheet" />
    <!-- Google Fonts removed for offline compatibility — using system font stack -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: #f6f8fa;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #d0d7de;
        border-radius: 3px;
      }
    </style>
  </head>

  <body>
    <div id="root" className="h-full w-full bg-black"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
